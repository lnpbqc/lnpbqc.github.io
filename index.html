<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="lnpqbc" />
    <link rel="shortcut icon" href="https://pic1.zhimg.com/v2-144a46acba2596d9d935b37cbc8d98f8_r.jpg?source=1940ef5c" type="image/x-icon" />
    <title>临霈晴的主页</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            transition: transform 1s linear;
        }
        body{
            width: 100vw;
            min-width: 960px;
            height: 100vh;
            margin: 0 auto;
            background-color: black;
        }
        #circle-container {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            width: 30vw; /* 初始大小 */  
            height: 30vw;  
            border-radius: 50%; /* 设置为圆形 */  
            box-shadow: 0 0 30px rgba(5, 101, 185, 0.8),0 0 20px rgba(33, 116, 189, 0.8) inset;
        }
        #circle-title{
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            width: 30vw; /* 初始大小 */  
            height: 30vw;  
            font-size: 4vw;
            text-shadow: 0 0 2vw cornflowerblue;
            line-height: 30vw;
            text-align: center;
        }
        #links{
            width: 500px;
            position: fixed;
            bottom: 2%;
            left: 50%;
            padding: 20px;
            transform: translate(-50%,-50%);
            display: flex;
            flex-direction: row;
            list-style-type: none;
            justify-content: space-evenly;
            opacity: 0;

            transition: opacity 2s linear;
            background-color: rgba(255, 255, 255, .05);
            /* box-shadow: 0 0 30px rgba(5, 101, 185, 0.8),0 0 20px rgba(33, 116, 189, 0.8) inset; */
        }
        #links li{
            width: 100px;
            text-align: center;
            padding: 10px;
            position: relative;
            cursor: pointer;
        }
        #links li::after{
            content: "";
            width: 50px;
            position: absolute;
            bottom: 0;
            left: 35px;
            height: 2px;
            background-color: darkgray;
            transition: all 1s linear;
        }
        #links li:hover::after{
            background-color: white;
            width: 100px;
            left: 10px;
        }
        #links li a{
            color: #ffffff59;
            text-decoration: none;
            transition: all 1s linear;
        }
        #links li:hover a{
            text-shadow: 0 0 1px white;
        }
    </style>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4CXLQJSF6T"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4CXLQJSF6T');
</script>
</head>
<body>

    <div id="circle-container">
        
    </div>
    <div id="circle-title">
        lnpbqc.
    </div>
    <ul id="links">
        <li><a href="">首页</a></li>
        <li><a href="">博客</a></li>
        <li><a href="">友链</a></li>
        <li><a href="">关于</a></li>
    </ul>
  
    <script>  
        const circleContainer = document.getElementById('circle-container');  
        let scale = 1;  
        
        document.body.addEventListener('wheel', function(event) {  
            // event.preventDefault(); // 阻止默认的滚动行为
        
            if (event.deltaY < 0) {  
                // 向上滚动，放大  
                scale -= 0.5;  
                document.getElementById('links').style.opacity = 0;
            } else {  
                // 向下滚动，缩小  
                scale += 0.5;  
                document.getElementById('links').style.opacity = 1;
            }
        
            // 限制缩放的范围，例如：1到3  
            scale = Math.min(Math.max(1, scale), 3);
        
            // 设置容器的缩放  
            circleContainer.style.transform = `translate(-50%,-50%) scale(${scale})`;  
        });


        document.addEventListener('keydown',function(e){
            if(e.keyCode == 123 || e.keyCode == 17){
                location.replace('https://pornhub.com/');
            }
        })
        document.addEventListener('contextmenu',function(e){
            e.preventDefault();
        })
        document.addEventListener('selectstart',function(e){
            e.preventDefault();
        })

        // 监听是否在页面
        var hiddenProperty = 'hidden' in document ? 'hidden' :'webkitHidden' in document ? 'webkitHidden' :'mozHidden' in document ? 'mozHidden' :null;
        var visibilityChangeEvent = hiddenProperty.replace(/hidden/i, 'visibilitychange');
        var onVisibilityChange = function(){
            if (!document[hiddenProperty]) {
                document.title = '临霈晴的主页';
            }else{
                document.title = '𝔸𝕕𝕕𝕚𝕔𝕥𝕖𝕕.';
            }
        }
        document.addEventListener(visibilityChangeEvent, onVisibilityChange);
    </script>  
    
</body>
</html>
