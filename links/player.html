<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            /* background-image: url("images/player.jpeg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed; */
            background: linear-gradient(to left bottom,rgb(255, 255, 255),rgb(92, 92, 92));
            justify-content: center;
            align-items: center;
            display: flex;
            /* filter: blur(500px); */
            /* background-origin: content-box; */
            width: 100%;
            height: 100vh;
        }
        #player{
            display: block;
            width: 450px;
            height: 300px;
            position: relative;
            text-align: center;
            text-shadow: 2px 2px 5px white;
            color: white;
            /* overflow: hidden; */
        }
        #cover{
            display: block;
            width: 300px;
            line-height: 300px;
            height: 300px;
            position: relative;
            background-image: url("../images/touxiang.jpg");
            /* background-color: aqua; */
            z-index: 99;
        }
        #cover span.title{
            font-size: 40px;
        }
        #cover span.note{
            display: block;
            position: absolute;
            width: 100px;
            height: 30px;
            right: 3px;
            bottom: 3px;
            color: white;
            box-shadow: inset 0 0 10px white;
            text-align: center;
            line-height: 30px;
            transition: all 1s;
        }
        #cover span.note:hover{
            cursor: pointer;
            border-radius: 10px;
            box-shadow: inset 0 0 10px black;
        }
        #cd {
            width: 300px;
            height: 300px;
            overflow: hidden;
            position: absolute;
            right: 0;
            top:0;
            border-radius: 150px;
            z-index: -1;
            box-shadow: 0 0 10px white;
        }
        #cd::before{
            content: "";
            position: absolute;
            display: block;
            width: 30px;
            height: 30px;
            background-color: black;
            left: calc(50% - 15px);
            top: calc(50% - 15px);
        }
        #cd >img{
            position: absolute;
            left: -50px;
            /* height: 100%; */
            animation: repeats 30s linear infinite;
        }
        #player > #description{
            position: absolute;
            /* height: 60px; */
            width: 450px;
            bottom: -60px;
            z-index: 99;
        }
        #player > #description p{
            display: block;
            height: 20px;
            margin: 5px auto;
            width: 100%;
            line-height: 20px;
        }
        #utils{
            overflow: hidden;
            position: absolute;
            bottom: -63px;
            width: 450px;
            height: 3px;
            background: #fff;
            transition: all;
            animation: forward linear 30s infinite;
        }
        @keyframes repeats {
            0%{
                transform: rotate(0deg);
                /* background-color: green; */
            }
            100%{
                transform: rotate(360deg);
                box-shadow: 0 0 10px red;
            }
        }
        @keyframes forward {
            0%{
                width: 0;
                background-color: green;
            }
            50%{
                width: 225px;
                background-color: greenyellow;
            }
            100%{
                width: 450px;
                background-color: red;
            }
        }
    </style>
</head>
<body>
    <div id="player">
        <div id="cover">
            <span class="title">THE SPRING</span>
            <span class="note">awsome</span>
        </div>
        <div id="cd">
            <img src="../images/touxiang.jpg" alt="">
        </div>
        <div id="description">
            <p>日落时醉醺醺地在泳池边的酒吧里缀饮</p>
            <p>Sun drunk sleeping in a pool side bar.</p>
        </div>
        <div id="utils"></div>
    </div>
</body>
</html>
